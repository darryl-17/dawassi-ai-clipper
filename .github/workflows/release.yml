name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v1.0.1 && git push origin v1.0.1
# This builds a clean zip (tracked files only — no node_modules/binaries) and
# publishes a GitHub Release with the asset + auto-generated notes.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release zips
        run: |
          # Versioned archive (permanent) + stable name (always points to newest via /releases/latest)
          git archive --format=zip --prefix=dawassi-ai-clipper/ -o "DAWASSI-AI-Clipper-${GITHUB_REF_NAME}.zip" HEAD
          cp "DAWASSI-AI-Clipper-${GITHUB_REF_NAME}.zip" "DAWASSI-AI-Clipper.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "DAWASSI AI Clipper ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            DAWASSI-AI-Clipper-${{ github.ref_name }}.zip
            DAWASSI-AI-Clipper.zip
