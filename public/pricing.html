<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>document.documentElement.classList.add('js')</script>
<title>Pricing — DAWASSI AI Clipper</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23e4571e'/%3E%3Ctext x='32' y='46' font-family='Arial Black,Arial' font-size='38' font-style='italic' font-weight='900' fill='white' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/site.css">
</head>
<body>
<main>
<section class="pagehero">
  <div class="eyebrow" data-animate data-i18n="price.eyebrow">.</div>
  <h1 class="h1" data-animate data-i18n="price.h2">.</h1>
  <p class="sub" data-animate data-i18n="pp.sub">.</p>
  
</section>
<section class="section" style="padding-top:6px">
  <div class="planbox" data-animate>
    <div class="price">$0<small> /<span data-i18n="pp.forever">forever</span></small></div>
    <ul>
      <li><span class="lic" data-ic="check"></span><span data-i18n="pp.f1">.</span></li>
      <li><span class="lic" data-ic="check"></span><span data-i18n="pp.f2">.</span></li>
      <li><span class="lic" data-ic="check"></span><span data-i18n="pp.f3">.</span></li>
      <li><span class="lic" data-ic="check"></span><span data-i18n="pp.f4">.</span></li>
      <li><span class="lic" data-ic="check"></span><span data-i18n="pp.f5">.</span></li>
      <li><span class="lic" data-ic="check"></span><span data-i18n="pp.f6">.</span></li>
    </ul>
    <a class="cta big magnetic" href="/app.html" style="width:100%;justify-content:center"><i data-ic="zap"></i><span data-i18n="price.cta">.</span></a>
  </div>
  <p class="compare" data-animate data-i18n="pp.compare">.</p>
  <div class="pageherocta" data-animate style="margin-top:24px"><a class="cta ghost" href="/book-a-call.html" data-i18n="nav.book">.</a></div>
</section>

</main>
<script src="/i18n.js"></script>
<script src="/site.js"></script>
</body>
</html>
