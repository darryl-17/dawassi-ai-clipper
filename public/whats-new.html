<!DOCTYPE html>
<html lang="en">
<head>

<title>What's new — DAWASSI AI Clipper</title>

<main>

</section>
<section class="section" style="padding-top:6px"><div class="news" data-stagger>
    <div class="newsitem" data-animate><span class="newstag">NEW</span><div data-i18n="new.n1"><b>.</b></div></div>
    <div class="newsitem" data-animate><span class="newstag">NEW</span><div data-i18n="new.n2"><b>.</b></div></div>
    <div class="newsitem" data-animate><span class="newstag">NEW</span><div data-i18n="new.n3"><b>.</b></div></div>
    <div class="newsitem" data-animate><span class="newstag">NEW</span><div data-i18n="new.n4"><b>.</b></div></div>
    <div class="newsitem" data-animate><span class="newstag">NEW</span><div data-i18n="new.n5"><b>.</b></div></div>
    <div class="newsitem" data-animate><span class="newstag">NEW</span><div data-i18n="new.n6"><b>.</b></div></div>
    <div class="newsitem" data-animate><span class="newstag">NEW</span><div data-i18n="new.n7"><b>.</b></div></div>
    <div class="newsitem" data-animate><span class="newstag">NEW</span><div data-i18n="new.n8"><b>.</b></div></div>
</div>
  <div class="eyebrow" data-animate data-i18n="wp.releases" style="margin-top:44px">.</div>
  <div class="news" data-stagger>
    <div class="newsitem" data-animate><span class="newstag date" data-i18n="wp.v1.v">.</span><div data-i18n="wp.v1.d">.</div></div>
    <div class="newsitem" data-animate><span class="newstag date" data-i18n="wp.v2.v">.</span><div data-i18n="wp.v2.d">.</div></div>
    <div class="newsitem" data-animate><span class="newstag date" data-i18n="wp.v3.v">.</span><div data-i18n="wp.v3.d">.</div></div>
    <div class="newsitem" data-animate><span class="newstag date" data-i18n="wp.v4.v">.</span><div data-i18n="wp.v4.d">.</div></div>
    <div class="newsitem" data-animate><span class="newstag date" data-i18n="wp.v5.v">.</span><div data-i18n="wp.v5.d">.</div></div>
</div>
</section>

</main>
<script src="/i18n.js"></script>
